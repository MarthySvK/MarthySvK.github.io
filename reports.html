<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.0.0/dist/umd/supabase.js"></script>
    <script>
        const supabase = supabase.createClient('https://uhgfekvfjetzypqzxxpr.supabase.co', 'sb_publishable_k32vrl72uDT8-UCE3Yeh_w_wrwzs-n0');

        async function submitForm(event) {
            event.preventDefault();

            const formData = new FormData(event.target);
            const fullName = formData.get('fullName');
            const email = formData.get('email');
            const company = formData.get('company');
            const phone = formData.get('phone');
            const reportId = formData.get('reportId');
            const timestamp = new Date().toISOString();
            const downloadCount = 0;

            const { data, error } = await supabase
                .from('email_signups')
                .insert([{ fullName, email, company, phone, reportId, timestamp, downloadCount }]);

            if (error) {
                console.error('Error:', error);
            } else {
                console.log('Success:', data);
            }
        }
    </script>
</head>
<body>
    <h1>Reports</h1>
    <form onsubmit="submitForm(event)">
        <input type="text" name="fullName" placeholder="Full Name" required><br>
        <input type="email" name="email" placeholder="Email" required><br>
        <input type="text" name="company" placeholder="Company"><br>
        <input type="text" name="phone" placeholder="Phone"><br>
        <input type="text" name="reportId" placeholder="Report ID" required><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
