<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Luxury Reports</h1>
        <nav>
            <ul>
                <li><a href="#report1">Report 1</a></li>
                <li><a href="#report2">Report 2</a></li>
                <li><a href="#report3">Report 3</a></li>
                <li><a href="#report4">Report 4</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="report1">
            <h2>Report 1</h2>
            <p>Details about report 1.</p>
        </section>
        <section id="report2">
            <h2>Report 2</h2>
            <p>Details about report 2.</p>
        </section>
        <section id="report3">
            <h2>Report 3</h2>
            <p>Details about report 3.</p>
        </section>
        <section id="report4">
            <h2>Report 4</h2>
            <p>Details about report 4.</p>
        </section>
    </main>
    <footer>
        <h3>Email Gating Form</h3>
        <form id="email-gate">
            <label for="email">Enter your email:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Submit</button>
        </form>
    </footer>
    <script src="supabase.js"></script>
    <script>
        // Supabase integration code
        const { createClient } = supabase;
        const supabaseUrl = 'https://your-supabase-url.supabase.co';
        const supabaseKey = 'your-supabase-key';
        const supabase = createClient(supabaseUrl, supabaseKey);

        document.getElementById('email-gate').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const { data, error } = await supabase
                .from('emails')
                .insert([{ email }]);
            if (error) console.error('Error:', error);
            else alert('Email submitted!');
        };
    </script>
</body>
</html>
