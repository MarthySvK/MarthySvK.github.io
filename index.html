<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Trebuchet+MS:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
            background-color: #FFFFFF;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #000000;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #FFFFFF;
            font-family: 'Cinzel', serif;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            color: #7A95B0;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #7A95B0;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        nav a:hover {
            background-color: #2E3E54;
            color: #FFFFFF;
        }
        .cta-button {
            background-color: #7A95B0;
            padding: 15px 30px;
            border: none;
            color: #FFFFFF;
            font-weight: bold;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .cta-button:hover {
            background-color: #2E3E54;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #000000;
            color: #FFFFFF;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
    <title>Luxury Wall Street Redesign</title>
</head>
<body>
    <header>
        <h1>Welcome to Our Investment Portal</h1>
        <nav>
            <a href="#reports">Reports</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>About Us</h2>
            <p>We provide bespoke investment solutions tailored to your needs.</p>
            <button class="cta-button">Get Started</button>
        </section>
        <section>
            <h2 id="reports">Our Reports</h2>
            <p>Explore our analytical reports to guide your investments.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 MarthySvK Investments</p>
    </footer>
</body>
</html>
